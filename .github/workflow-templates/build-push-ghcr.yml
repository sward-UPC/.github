name: Build & Push to GHCR

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nombre de la imagen en GHCR (ej: sward-ms-usuarios)"
        required: true
        type: string
      python_version:
        description: "Versión de Python"
        required: false
        type: string
        default: "3.11"
      needs_shared:
        description: "Instalar sward-shared desde GitHub"
        required: false
        type: boolean
        default: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Instalar dependencias de desarrollo
        run: pip install -q -r requirements-dev.txt

      - name: Instalar sward-shared
        if: ${{ inputs.needs_shared }}
        run: pip install -q "sward-shared @ git+https://github.com/sward-UPC/sward-shared.git@main"

      - name: Instalar dependencias del servicio
        run: pip install -q -r requirements.txt

      - name: Lint con ruff
        run: ruff check . && ruff format --check .

      - name: Tests
        run: pytest tests/ -q

      - name: Generar timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/sward-upc/${{ inputs.image_name }}:${{ steps.ts.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
