name: Build & Push to GHCR

on:
  workflow_call:
    inputs:
      image_name:
        description: "Nombre de la imagen en GHCR (ej: sward-ms-usuarios)"
        required: true
        type: string
      service_type:
        description: "Tipo: 'microservice' o 'lambda'"
        required: true
        type: string
      aws_service_name:
        description: "Nombre del servicio ECS o función Lambda en AWS"
        required: false
        type: string
        default: ""
      aws_cluster_name:
        description: "Nombre del cluster ECS (solo microservicios)"
        required: false
        type: string
        default: "sward-cluster"
      python_version:
        required: false
        type: string
        default: "3.11"
      needs_shared:
        description: "Instalar sward-shared desde GitHub"
        required: false
        type: boolean
        default: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SEND_TO_AWS: ${{ secrets.SEND_TO_AWS }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Instalar dependencias de desarrollo
        run: pip install -q -r requirements-dev.txt

      - name: Instalar sward-shared
        if: ${{ inputs.needs_shared }}
        run: pip install -q "sward-shared @ git+https://github.com/sward-UPC/sward-shared.git@main"

      - name: Instalar dependencias del servicio
        run: pip install -q -r requirements.txt

      - name: Lint con ruff
        run: ruff check . && ruff format --check .

      - name: Tests
        run: pytest tests/ -q

      - name: Generar timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push a GHCR
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/sward-upc/${{ inputs.image_name }}:${{ steps.ts.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Deploy a AWS (SEND_TO_AWS=true para activar) ──────────────────────

      - name: Configurar credenciales AWS
        if: ${{ env.SEND_TO_AWS == 'true' && inputs.aws_service_name != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy a ECS (microservicio)
        if: ${{ env.SEND_TO_AWS == 'true' && inputs.service_type == 'microservice' && inputs.aws_service_name != '' }}
        run: |
          echo "Deployando ${{ inputs.aws_service_name }} en cluster ${{ inputs.aws_cluster_name }}..."
          aws ecs update-service \
            --cluster ${{ inputs.aws_cluster_name }} \
            --service ${{ inputs.aws_service_name }} \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text
          echo "ECS rolling update iniciado"

      - name: Deploy a Lambda
        if: ${{ env.SEND_TO_AWS == 'true' && inputs.service_type == 'lambda' && inputs.aws_service_name != '' }}
        run: |
          IMAGE_URI="ghcr.io/sward-upc/${{ inputs.image_name }}:${{ steps.ts.outputs.ts }}"
          echo "Actualizando Lambda ${{ inputs.aws_service_name }} con imagen $IMAGE_URI..."
          aws lambda update-function-code \
            --function-name ${{ inputs.aws_service_name }} \
            --image-uri $IMAGE_URI \
            --query 'FunctionName' \
            --output text
          echo "Lambda actualizada"
